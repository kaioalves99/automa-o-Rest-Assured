name: Run Rest Assunred Tests

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  run-testes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup up Maven
        run: |
            mvn --version

      - name: Build and run tests
        run: |
          mvn -Dtest=TesteBasico test